services:
  - type: web
    name: birdnet-online-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_KEY
        sync: false          # Supabase service role key — set manually in Render dashboard
      - key: DETECTION_TOKEN
        sync: false          # Optional: bearer token the Pi must send on POST /detection
      - key: VAPID_PRIVATE_KEY
        sync: false          # Web push VAPID private key
      - key: VAPID_PUBLIC_KEY
        sync: false          # Web push VAPID public key (also set in web/index.html)
      - key: SMTP_HOST
        sync: false          # Optional: SMTP server for weekly digest emails
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: DIGEST_EMAIL
        sync: false          # Recipient address for weekly digest
    healthCheckPath: /
    plan: free
